<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Blok Renner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 10px; font-size: 1.5rem; }
    canvas { background: #222; border: 2px solid #555; max-width: 100%; }
    @media (max-width: 500px) {
      canvas { width: 100vw !important; height: auto !important; }
      h1 { font-size: 1.1rem; }
      #dpad button, #btn-pause { width: 50px; height: 50px; font-size: 20px; }
      #dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
    }
    #controls { display: flex; align-items: center; gap: 16px; margin-top: 16px; }
    #dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 4px; user-select: none; }
    #btn-pause, #btn-mute, #btn-night { width: 60px; height: 60px; background: #333; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; touch-action: none; align-self: center; }
    body.night-mode { background: #1a0030; }
    body.night-mode canvas { border-color: #6633aa; }
    #dpad button { background: #333; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; touch-action: none; }
    #dpad button:active { background: #4af; }
    @keyframes skin-pulse {
      0%, 100% { box-shadow: 0 0 6px 3px currentColor; transform: scale(1); }
      50%       { box-shadow: 0 0 14px 6px currentColor; transform: scale(1.12); }
    }
    .skin-selected { animation: skin-pulse 0.9s ease-in-out infinite; border: 3px solid #fff !important; }
    @keyframes skin-shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px) rotate(-4deg); }
      30%  { transform: translateX(6px) rotate(4deg); }
      45%  { transform: translateX(-5px) rotate(-3deg); }
      60%  { transform: translateX(5px) rotate(3deg); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .skin-levelup { animation: skin-shake 0.45s ease-in-out; }
    #canvas-wrap { position: relative; display: inline-block; }
    #name-entry { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.93); border:2px solid #4af; border-radius:12px; padding:14px 18px; text-align:center; z-index:10; }
    #name-entry p { margin:0 0 8px; font-size:13px; color:#4af; }
    #name-entry input { background:#222; border:1px solid #4af; border-radius:6px; color:#fff; font-size:16px; padding:5px 8px; width:130px; outline:none; }
    #name-entry button { background:#4af; border:none; border-radius:6px; color:#000; font-size:15px; font-weight:bold; padding:6px 12px; cursor:pointer; margin-left:6px; }
  </style>
</head>
<body>
  <h1>Blok Renner</h1>
  <div id="canvas-wrap">
    <canvas id="c" width="640" height="300"></canvas>
    <div id="name-entry">
      <p>Voer je naam in voor de topscore:</p>
      <input type="text" id="player-name" maxlength="12" placeholder="Naam">
      <button id="name-submit">✓</button>
    </div>
  </div>
  <p id="info">Gebruik pijltjestoetsen of knoppen om te bewegen</p>
  <div id="skin-select" style="display:flex;gap:8px;align-items:center;margin:4px 0;font-size:13px;color:#aaa;">
    <span>Kleur:</span>
  </div>
  <div id="controls">
    <div id="dpad">
      <span></span>
      <button id="btn-up">▲</button>
      <span></span>
      <button id="btn-left">◀</button>
      <button id="btn-down">▼</button>
      <button id="btn-right">▶</button>
      <span></span><span></span><span></span>
    </div>
    <button id="btn-pause">⏸</button>
    <button id="btn-mute">🔊</button>
    <button id="btn-night">🌙</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let muted = false;
    let nightMode = false;

    // Achtergrondmuziek: bas-puls die sneller tikt op hogere levels
    let bgBeatInterval = null;
    function startBgMusic() {
      if (bgBeatInterval) return;
      function tick() {
        if (!gameStarted || gameOver || paused) return;
        const level = Math.floor(score / 10) + 1;
        if (!muted) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.value = 60 + (level - 1) * 10;
          gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
          osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
        const interval = Math.max(300, 800 - (level - 1) * 80);
        bgBeatInterval = setTimeout(tick, interval);
      }
      tick();
    }
    function stopBgMusic() { clearTimeout(bgBeatInterval); bgBeatInterval = null; }
    function playBeep(freq, duration, type = 'square') {
      if (muted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const player = { x: 40, y: 220, w: 30, h: 30, speed: 4, color: '#4af', rotation: 0, rotVel: 0 };

    const obstacles = [];
    let spawnTimer = 0;
    let score = 0;
    let scoreTimer = 0;
    let gameOver = false;
    let gameStarted = false;
    let highscore = parseInt(localStorage.getItem('blokrenner_hs') || '0');
    let isNewHighscore = false;
    let sessionTimer = 0;
    let bestTime = parseInt(localStorage.getItem('blokrenner_bt') || '0');
    let isNewBestTime = false;
    function loadHighscores() {
      try {
        const raw = JSON.parse(localStorage.getItem('blokrenner_top3') || '[]');
        return raw.map(e => typeof e === 'object' ? e : { name: '???', score: e });
      } catch(e) { return []; }
    }
    function saveHighscores(name, sc) {
      const list = loadHighscores();
      list.push({ name: name || '???', score: sc });
      list.sort((a, b) => b.score - a.score);
      const top3 = list.slice(0, 3);
      localStorage.setItem('blokrenner_top3', JSON.stringify(top3));
    }
    let pendingScore = 0;
    const nameEntryEl = document.getElementById('name-entry');
    const playerNameInput = document.getElementById('player-name');
    function showNameEntry(sc) {
      pendingScore = sc;
      playerNameInput.value = '';
      nameEntryEl.style.display = 'block';
      setTimeout(() => playerNameInput.focus(), 50);
    }
    function submitName() {
      const name = playerNameInput.value.trim() || '???';
      saveHighscores(name, pendingScore);
      nameEntryEl.style.display = 'none';
    }
    document.getElementById('name-submit').addEventListener('click', submitName);
    playerNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.stopPropagation(); submitName(); } });
    // Dagelijkse uitdaging
    function getDailyChallenge() {
      const now = new Date();
      const dayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
      const seed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
      const types = [
        { type: 'coins', target: 5 + (seed % 16), desc: (t) => `Verzamel ${t} muntjes`, reward: 15 },
        { type: 'survive', target: 30 + (seed % 61), desc: (t) => `Overleef ${t} seconden`, reward: 20 },
        { type: 'score', target: 10 + (seed % 41), desc: (t) => `Bereik score ${t}`, reward: 25 },
      ];
      const ch = types[seed % types.length];
      const completed = localStorage.getItem('blokrenner_daily_' + dayKey) === '1';
      return { ...ch, dayKey, completed };
    }
    let dailyChallenge = getDailyChallenge();
    let dailyChallengeProgress = 0;
    let dailyChallengeCompleted = dailyChallenge.completed;
    let dailyChallengeFlash = 0;

    // Winkel
    let totalCoins = parseInt(localStorage.getItem('blokrenner_coins') || '0');
    let shopOpen = false;
    let shopShield = false;
    let shopExtraLife = false;
    const SHOP_SHIELD_COST = 10;
    const SHOP_LIFE_COST = 20;

    let lives = 3;
    let hitInvincible = false;
    let hitInvincibleTimer = 0;
    const HIT_INVINCIBLE_DURATION = 90;

    // Sterren achtergrond (twee lagen voor parallax)
    const stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * 640,
      y: Math.random() * 300,
      size: 1 + Math.random() * 2,
      speed: 0.3 + Math.random() * 0.7
    }));
    const starsBack = Array.from({ length: 35 }, () => ({
      x: Math.random() * 640,
      y: Math.random() * 300,
      size: 0.5 + Math.random() * 1,
      speed: 0.1 + Math.random() * 0.2
    }));
    function updateStars() {
      for (const s of stars) { s.y += s.speed; if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } }
      for (const s of starsBack) { s.y += s.speed; if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } }
    }
    function drawStars() {
      ctx.fillStyle = nightMode ? '#442266' : '#555';
      for (const s of starsBack) ctx.fillRect(s.x, s.y, s.size, s.size);
      ctx.fillStyle = nightMode ? '#ffcc00' : '#aaa';
      for (const s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Muntjes
    const coins = [];
    const coinTrails = [];
    let coinTimer = 0;
    const COIN_INTERVAL = 200;

    function spawnCoin() {
      const size = 12;
      coins.push({ x: Math.random() * (canvas.width - size), y: -size, w: size, h: size, speed: 1.5 + Math.random() * 1.5 });
    }

    // Particles
    const particles = [];
    function spawnParticles(x, y) {
      const colors = ['#ff4','#f80','#f44','#f0f','#4ff'];
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x: x + 15, y: y + 15,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 30 + Math.random() * 20
        });
      }
    }

    // Confetti
    const confetti = [];
    const confettiMilestones = new Set();
    const CONFETTI_SCORES = [25, 50, 75];
    function spawnConfetti() {
      const colors = ['#ff4','#f80','#f44','#f0f','#4ff','#0f8','#fff'];
      for (let i = 0; i < 30; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: -Math.random() * 20,
          vx: (Math.random() - 0.5) * 2,
          vy: 1.5 + Math.random() * 2.5,
          size: 5 + Math.random() * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 90 + Math.random() * 60
        });
      }
    }

    // Power-up
    let powerUp = null;
    let powerUpTimer = 0;
    let invincible = false;
    let invincibleTimer = 0;
    let speedBoost = false;
    let speedBoostTimer = 0;
    const POWERUP_INTERVAL = 300;
    const INVINCIBLE_DURATION = 180;
    const SPEED_BOOST_DURATION = 180;
    let scoreMultiplier = 1;
    let scoreMultiplierTimer = 0;
    const SCORE_MULTIPLIER_DURATION = 1800;
    let gameOverSpin = false;
    let gameOverSpinTimer = 0;
    const GAME_OVER_SPIN_DURATION = 30;

    // Pauze
    let paused = false;
    let playerIdleTimer = 0;
    let scoreFlash = 0;
    let powerUpFlash = 0;
    const scorePops = [];
    const explosionRings = [];
    const trail = [];
    const skinColors = ['#4af', '#f80', '#0f8', '#a0f', '#f0a'];
    let skinColor = skinColors[0];

    // Boss-systeem
    const bossLevelsSpawned = new Set();
    let bossWarningTimer = 0;
    const BOSS_WARNING_DURATION = 180;

    function spawnBoss() {
      const w = 60, h = 60;
      obstacles.push({
        x: canvas.width / 2 - w / 2,
        y: -h,
        w, h,
        speed: 1.2,
        warn: false,
        type: 'boss',
        rotation: 0,
        rotSpeed: 0.015
      });
      playBeep(120, 0.6, 'sawtooth');
    }

    // Combo-systeem
    let comboCount = 0;
    let comboTimer = 0;
    let dodgeStreak = 0;
    let comboDisplay = '';
    let comboDisplayTimer = 0;
    const COMBO_WINDOW = 120;
    let lastLevel = 1;
    let levelBanner = '';
    let levelBannerTimer = 0;
    let milestoneBanner = '';
    let milestoneBannerTimer = 0;
    const MILESTONES = { 10: 'Halverwege!', 20: 'Bijna level 3!', 50: 'Score 50! Geweldig!' };
    let levelFlash = 0;
    let gameOverFlash = 0;
    let shakeTimer = 0;
    const SHAKE_DURATION = 12;
    let heartBlinkTimer = 0;
    let heartBlinkIndex = -1;
    let introLetters = 0;
    let introLetterTimer = 0;
    const INTRO_TITLE = 'Blok Renner';

    // Achievements
    const achievementQueue = [];
    let achievementTimer = 0;
    const ACHIEVEMENT_DURATION = 150;
    const achievementsUnlocked = new Set();
    let sessionCoinCount = 0;

    function triggerAchievement(id, text) {
      if (achievementsUnlocked.has(id)) return;
      achievementsUnlocked.add(id);
      achievementQueue.push(text);
      if (achievementTimer === 0 && achievementQueue.length === 1) achievementTimer = ACHIEVEMENT_DURATION;
    }

    function spawnObstacle() {
      const types = ['rect', 'rect', 'rect', 'triangle', 'circle', 'zigzag'];
      const type = types[Math.floor(Math.random() * types.length)];
      const size = (type === 'rect') ? [20, 20, 40, 16, 16, 40][Math.floor(Math.random()*3)*2] : 26;
      const w = type === 'rect' ? [20,40,16][Math.floor(Math.random()*3)] : size;
      const h = type === 'rect' ? [20,16,40][Math.floor(Math.random()*3)] : size;
      const spd = 2 + Math.random() * 2 + score * 0.3;
      const obs = {
        x: Math.random() * (canvas.width - w),
        y: -h,
        w, h,
        speed: spd,
        warn: spd > 5,
        type,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.06
      };
      if (type === 'zigzag') {
        obs.zigzagSpeed = 2 + Math.random() * 2;
        obs.zigzagDir = Math.random() < 0.5 ? 1 : -1;
        // 40% kans: van links of rechts het scherm in ipv van boven
        if (Math.random() < 0.4) {
          const fromLeft = Math.random() < 0.5;
          obs.x = fromLeft ? -w : canvas.width;
          obs.y = Math.random() * (canvas.height - h);
          obs.speed = 0; // geen verticale beweging
          obs.zigzagSpeed = 2 + Math.random() * 2;
          obs.zigzagDir = fromLeft ? 1 : -1;
          obs.horizontal = true;
        }
      }
      obstacles.push(obs);
    }

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',  e => keys[e.key] = false);

    // Swipe-besturing voor touchscreens
    const SWIPE_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
    let swipeTouchId = null, swipeStartX = 0, swipeStartY = 0;
    canvas.addEventListener('touchstart', e => {
      if (swipeTouchId !== null) return;
      const t = e.changedTouches[0];
      swipeTouchId = t.identifier; swipeStartX = t.clientX; swipeStartY = t.clientY;
      if (!gameStarted) { gameStarted = true; startBgMusic(); }
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      for (const t of e.changedTouches) {
        if (t.identifier !== swipeTouchId) continue;
        const dx = t.clientX - swipeStartX, dy = t.clientY - swipeStartY;
        SWIPE_KEYS.forEach(k => keys[k] = false);
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          if (Math.abs(dx) >= Math.abs(dy)) keys[dx > 0 ? 'ArrowRight' : 'ArrowLeft'] = true;
          else keys[dy > 0 ? 'ArrowDown' : 'ArrowUp'] = true;
        }
      }
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier !== swipeTouchId) continue;
        SWIPE_KEYS.forEach(k => keys[k] = false);
        swipeTouchId = null;
      }
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchcancel', e => {
      SWIPE_KEYS.forEach(k => keys[k] = false);
      swipeTouchId = null;
    }, { passive: false });

    function bindBtn(id, key) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if (!gameStarted) { gameStarted = true; startBgMusic(); } }, { passive: false });
      btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
      btn.addEventListener('mousedown',  () => { keys[key] = true;  if (!gameStarted) { gameStarted = true; startBgMusic(); } });
      btn.addEventListener('mouseup',    () => { keys[key] = false; });
      btn.addEventListener('mouseleave', () => { keys[key] = false; });
    }
    bindBtn('btn-up',    'ArrowUp');
    bindBtn('btn-down',  'ArrowDown');
    bindBtn('btn-left',  'ArrowLeft');
    bindBtn('btn-right', 'ArrowRight');

    const pauseBtn = document.getElementById('btn-pause');
    function updatePauseIcon() { pauseBtn.textContent = paused ? '▶' : '⏸'; }
    pauseBtn.addEventListener('click', () => {
      if (gameStarted && !gameOver) { paused = !paused; updatePauseIcon(); }
    });
    pauseBtn.addEventListener('touchstart', e => { e.preventDefault(); if (gameStarted && !gameOver) { paused = !paused; updatePauseIcon(); } }, { passive: false });

    const muteBtn = document.getElementById('btn-mute');
    function updateMuteIcon() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
    muteBtn.addEventListener('click', () => { muted = !muted; updateMuteIcon(); });
    muteBtn.addEventListener('touchstart', e => { e.preventDefault(); muted = !muted; updateMuteIcon(); }, { passive: false });

    const nightBtn = document.getElementById('btn-night');
    function toggleNight() {
      nightMode = !nightMode;
      nightBtn.textContent = nightMode ? '☀️' : '🌙';
      document.body.classList.toggle('night-mode', nightMode);
    }
    nightBtn.addEventListener('click', toggleNight);
    nightBtn.addEventListener('touchstart', e => { e.preventDefault(); toggleNight(); }, { passive: false });

    function collides(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playComboChord(combo) {
      if (muted) return;
      const baseFreqs = [330, 392, 494, 587, 698, 831];
      const notes = Math.min(combo, baseFreqs.length);
      for (let i = 0; i < notes; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.value = baseFreqs[i];
        const t = audioCtx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
      }
    }

    function playFallingSweep() {
      if (muted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(700, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function playRisingSweep() {
      if (muted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    let slowMotion = false;
    let slowMotionTimer = 0;
    const SLOW_MOTION_DURATION = 180;

    function spawnPowerUp() {
      const r = Math.random();
      const type = r < 0.25 ? 'shield' : r < 0.5 ? 'speed' : r < 0.75 ? 'multiplier' : 'slowmo';
      powerUp = { x: Math.random() * (canvas.width - 20), y: -20, w: 20, h: 20, speed: 2, type };
      playRisingSweep();
    }

    function reset() {
      player.x = 40; player.y = 220; player.rotation = 0; player.rotVel = 0;
      obstacles.length = 0;
      spawnTimer = 0; scoreTimer = 0; score = 0;
      gameOver = false;
      gameStarted = true;
      stopBgMusic(); startBgMusic();
      powerUp = null; powerUpTimer = 0; invincible = false; invincibleTimer = 0; speedBoost = false; speedBoostTimer = 0; slowMotion = false; slowMotionTimer = 0;
      lastLevel = 1; levelBanner = ''; levelBannerTimer = 0; levelFlash = 0; gameOverFlash = 0; shakeTimer = 0;
      milestoneBanner = ''; milestoneBannerTimer = 0;
      lives = 3; hitInvincible = false; hitInvincibleTimer = 0; explosionRings.length = 0; isNewHighscore = false; sessionTimer = 0; isNewBestTime = false;
      heartBlinkTimer = 0; heartBlinkIndex = -1; powerUpFlash = 0; confettiMilestones.clear(); confetti.length = 0; coins.length = 0; coinTimer = 0; scoreMultiplier = 1; scoreMultiplierTimer = 0; gameOverSpin = false; gameOverSpinTimer = 0;
      bossLevelsSpawned.clear(); bossWarningTimer = 0;
      dodgeStreak = 0;
      achievementsUnlocked.clear(); achievementQueue.length = 0; achievementTimer = 0; sessionCoinCount = 0; coinTrails.length = 0;
      dailyChallenge = getDailyChallenge(); dailyChallengeCompleted = dailyChallenge.completed;
      dailyChallengeProgress = dailyChallenge.type === 'coins' ? 0 : (dailyChallenge.type === 'survive' ? 0 : 0);
      if (shopShield) { invincible = true; invincibleTimer = INVINCIBLE_DURATION; shopShield = false; }
      if (shopExtraLife) { lives = 4; shopExtraLife = false; }
    }

    document.addEventListener('keydown', e => {
      if (!gameStarted && e.key === 'Enter') { gameStarted = true; startBgMusic(); }
      if (gameOver && e.key === 'Enter') reset();
      if (gameStarted && !gameOver && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        paused = !paused; updatePauseIcon();
      }
    });

    function update() {
      updateStars();
      if (!gameStarted) {
        introLetterTimer++;
        if (introLetterTimer >= 4 && introLetters < INTRO_TITLE.length) {
          introLetters++;
          introLetterTimer = 0;
        }
        return;
      }
      if (gameOverSpin) {
        player.rotation += (Math.PI * 2) / GAME_OVER_SPIN_DURATION;
        gameOverSpinTimer--;
        for (let i = explosionRings.length - 1; i >= 0; i--) { const ring = explosionRings[i]; ring.r += (ring.maxR - ring.r) * 0.06; ring.life--; if (ring.life <= 0) explosionRings.splice(i, 1); }
        for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; if (p.life <= 0) particles.splice(i, 1); }
        if (gameOverSpinTimer <= 0) { gameOverSpin = false; gameOver = true; gameOverFlash = 30; }
        return;
      }
      if (gameOver || paused) return;

      const moving = keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'];
      if (moving) { playerIdleTimer = 0; } else { playerIdleTimer++; }
      if (moving) trail.push({ x: player.x, y: player.y, life: 10 });
      if (trail.length > 8) trail.shift();
      for (let i = trail.length - 1; i >= 0; i--) { trail[i].life--; if (trail[i].life <= 0) trail.splice(i, 1); }

      const currentSpeed = speedBoost ? player.speed * 2 : player.speed;
      if (keys['ArrowLeft'])  { player.x = Math.max(0, player.x - currentSpeed); player.rotVel -= 0.04; }
      if (keys['ArrowRight']) { player.x = Math.min(canvas.width - player.w, player.x + currentSpeed); player.rotVel += 0.04; }
      if (keys['ArrowUp'])    player.y = Math.max(0, player.y - currentSpeed);
      if (keys['ArrowDown'])  player.y = Math.min(canvas.height - player.h, player.y + currentSpeed);
      player.rotVel *= 0.88;
      player.rotation += player.rotVel;

      const spawnInterval = Math.max(20, 60 - score * 2);
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnObstacle();
        if (Math.floor(score / 10) + 1 >= 5) spawnObstacle();
        spawnTimer = 0;
      }

      sessionTimer++;
      if (sessionTimer === 1800) triggerAchievement('survive30', '⏱ 30 seconden overleefd!');
      // Dagelijkse uitdaging voortgang: survive & score
      if (!dailyChallengeCompleted) {
        if (dailyChallenge.type === 'survive') {
          dailyChallengeProgress = Math.floor(sessionTimer / 60);
          if (dailyChallengeProgress >= dailyChallenge.target) {
            dailyChallengeCompleted = true;
            localStorage.setItem('blokrenner_daily_' + dailyChallenge.dayKey, '1');
            totalCoins += dailyChallenge.reward;
            localStorage.setItem('blokrenner_coins', totalCoins);
            dailyChallengeFlash = 180;
          }
        } else if (dailyChallenge.type === 'score') {
          dailyChallengeProgress = score;
          if (dailyChallengeProgress >= dailyChallenge.target) {
            dailyChallengeCompleted = true;
            localStorage.setItem('blokrenner_daily_' + dailyChallenge.dayKey, '1');
            totalCoins += dailyChallenge.reward;
            localStorage.setItem('blokrenner_coins', totalCoins);
            dailyChallengeFlash = 180;
          }
        }
      }
      if (dailyChallengeFlash > 0) dailyChallengeFlash--;

      scoreTimer++;
      if (scoreTimer >= 60) {
        score += scoreMultiplier; scoreTimer = 0; scoreFlash = 12;
        const popText = scoreMultiplier > 1 ? '+' + scoreMultiplier : '+1';
        scorePops.push({ x: player.x + player.w / 2, y: player.y - 4, text: popText, life: 50, maxLife: 50 });
        const newLevel = Math.floor(score / 10) + 1;
        if (newLevel > lastLevel) {
          lastLevel = newLevel; levelBanner = 'LEVEL ' + newLevel + '!'; levelBannerTimer = 120; levelFlash = 22; playBeep(523, 0.2);
          const skinDiv = document.getElementById('skin-select');
          skinDiv.classList.remove('skin-levelup');
          void skinDiv.offsetWidth;
          skinDiv.classList.add('skin-levelup');
          setTimeout(() => skinDiv.classList.remove('skin-levelup'), 500);
          if (newLevel % 5 === 0 && !bossLevelsSpawned.has(newLevel)) { bossLevelsSpawned.add(newLevel); bossWarningTimer = BOSS_WARNING_DURATION; }
        }
        if (MILESTONES[score]) { milestoneBanner = MILESTONES[score]; milestoneBannerTimer = 120; playBeep(440, 0.15, 'triangle'); }
        if (CONFETTI_SCORES.includes(score) && !confettiMilestones.has(score)) { confettiMilestones.add(score); spawnConfetti(); }
      }

      // Power-up spawnen
      powerUpTimer++;
      if (powerUpTimer >= POWERUP_INTERVAL && !powerUp) { spawnPowerUp(); powerUpTimer = 0; }

      // Muntjes spawnen, bewegen & ophalen
      coinTimer++;
      if (coinTimer >= COIN_INTERVAL) { spawnCoin(); coinTimer = 0; }
      for (let i = coins.length - 1; i >= 0; i--) {
        coins[i].y += coins[i].speed;
        if (Math.random() < 0.5) {
          coinTrails.push({ x: coins[i].x + coins[i].w/2 + (Math.random()-0.5)*4, y: coins[i].y + (Math.random()-0.5)*3, vx: (Math.random()-0.5)*0.6, vy: -0.4 - Math.random()*0.6, size: 1.5 + Math.random()*2, life: 12 + Math.random()*10 });
        }
        if (coins[i].y > canvas.height) {
          coins.splice(i, 1);
        } else if (collides(player, coins[i])) {
          const coinGain = 5 * scoreMultiplier;
          score += coinGain;
          totalCoins++;
          localStorage.setItem('blokrenner_coins', totalCoins);
          sessionCoinCount++;
          if (sessionCoinCount === 10) triggerAchievement('coins10', '🪙 10 muntjes verzameld!');
          if (!dailyChallengeCompleted && dailyChallenge.type === 'coins') {
            dailyChallengeProgress++;
            if (dailyChallengeProgress >= dailyChallenge.target) {
              dailyChallengeCompleted = true;
              localStorage.setItem('blokrenner_daily_' + dailyChallenge.dayKey, '1');
              totalCoins += dailyChallenge.reward;
              localStorage.setItem('blokrenner_coins', totalCoins);
              dailyChallengeFlash = 180;
            }
          }
          scorePops.push({ x: coins[i].x + coins[i].w / 2, y: coins[i].y, text: '+' + coinGain, life: 60, maxLife: 60, big: true });
          playBeep(1047, 0.1, 'sine');
          // Ster-burst bij ophalen muntje
          for (let s = 0; s < 12; s++) {
            const angle = (s / 12) * Math.PI * 2;
            const spd = 1.2 + Math.random() * 2.5;
            coinTrails.push({
              x: coins[i].x + coins[i].w / 2, y: coins[i].y + coins[i].h / 2,
              vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 0.6,
              size: 2.5 + Math.random() * 3, life: 22 + Math.random() * 14
            });
          }
          coins.splice(i, 1);
        }
      }

      // Power-up bewegen & ophalen
      if (powerUp) {
        powerUp.y += powerUp.speed;
        if (powerUp.y > canvas.height) { powerUp = null; }
        else if (collides(player, powerUp)) {
          if (powerUp.type === 'shield') {
            invincible = true; invincibleTimer = INVINCIBLE_DURATION;
          } else if (powerUp.type === 'speed') {
            speedBoost = true; speedBoostTimer = SPEED_BOOST_DURATION;
          } else if (powerUp.type === 'multiplier') {
            scoreMultiplier = 2; scoreMultiplierTimer = SCORE_MULTIPLIER_DURATION;
          } else if (powerUp.type === 'slowmo') {
            slowMotion = true; slowMotionTimer = SLOW_MOTION_DURATION;
          }
          powerUp = null; playBeep(660, 0.15); powerUpFlash = 12;
        }
      }

      // Muntje-sterrenspoor updaten
      for (let i = coinTrails.length - 1; i >= 0; i--) {
        const t = coinTrails[i]; t.x += t.vx; t.y += t.vy; t.life--;
        if (t.life <= 0) coinTrails.splice(i, 1);
      }

      // Particles updaten
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      // Confetti updaten
      for (let i = confetti.length - 1; i >= 0; i--) {
        const c = confetti[i];
        c.x += c.vx; c.y += c.vy; c.life--;
        if (c.life <= 0 || c.y > canvas.height) confetti.splice(i, 1);
      }

      // Invincibility aftellen
      if (invincible) { invincibleTimer--; if (invincibleTimer <= 0) { invincible = false; playFallingSweep(); } }
      if (speedBoost) { speedBoostTimer--; if (speedBoostTimer <= 0) { speedBoost = false; playFallingSweep(); } }
      if (scoreMultiplier > 1) { scoreMultiplierTimer--; if (scoreMultiplierTimer <= 0) { scoreMultiplier = 1; playFallingSweep(); } }
      if (slowMotion) { slowMotionTimer--; if (slowMotionTimer <= 0) { slowMotion = false; playFallingSweep(); } }
      if (hitInvincible) { hitInvincibleTimer--; if (hitInvincibleTimer <= 0) hitInvincible = false; }

      for (let i = scorePops.length - 1; i >= 0; i--) { scorePops[i].y -= 0.9; scorePops[i].life--; if (scorePops[i].life <= 0) scorePops.splice(i, 1); }
      for (let i = explosionRings.length - 1; i >= 0; i--) { const ring = explosionRings[i]; ring.r += (ring.maxR - ring.r) * 0.06; ring.life--; if (ring.life <= 0) explosionRings.splice(i, 1); }
      if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
      if (comboDisplayTimer > 0) comboDisplayTimer--;
      if (levelBannerTimer > 0) levelBannerTimer--;
      if (milestoneBannerTimer > 0) milestoneBannerTimer--;
      if (bossWarningTimer > 0) { bossWarningTimer--; if (bossWarningTimer === 0) spawnBoss(); }
      if (achievementTimer > 0) { achievementTimer--; }
      else if (achievementQueue.length > 0) { achievementQueue.shift(); if (achievementQueue.length > 0) achievementTimer = ACHIEVEMENT_DURATION; }
      if (levelFlash > 0) levelFlash--;
      if (gameOverFlash > 0) gameOverFlash--;
      if (shakeTimer > 0) shakeTimer--;
      if (scoreFlash > 0) scoreFlash--;
      if (heartBlinkTimer > 0) heartBlinkTimer--;
      if (powerUpFlash > 0) powerUpFlash--;

      const slowFactor = slowMotion ? 0.5 : 1;
      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (obstacles[i].horizontal) {
          obstacles[i].x += obstacles[i].zigzagSpeed * obstacles[i].zigzagDir * slowFactor;
          obstacles[i].y += (Math.random() - 0.5) * 1.5 * slowFactor;
          obstacles[i].y = Math.max(0, Math.min(canvas.height - obstacles[i].h, obstacles[i].y));
        } else {
          obstacles[i].y += obstacles[i].speed * slowFactor;
          if (obstacles[i].type === 'zigzag') {
            obstacles[i].x += obstacles[i].zigzagSpeed * obstacles[i].zigzagDir * slowFactor;
            if (obstacles[i].x <= 0 || obstacles[i].x + obstacles[i].w >= canvas.width) {
              obstacles[i].zigzagDir *= -1;
              obstacles[i].x = Math.max(0, Math.min(canvas.width - obstacles[i].w, obstacles[i].x));
            }
          }
        }
        obstacles[i].rotation += obstacles[i].rotSpeed;
        // Near miss bonus: +2 als obstakel binnen 5px van speler passeert maar niet raakt
        if (!obstacles[i].nearMissTriggered && !invincible && !hitInvincible) {
          const o = obstacles[i];
          const gapX = Math.max(0, Math.max(player.x, o.x) - Math.min(player.x + player.w, o.x + o.w));
          const gapY = Math.max(0, Math.max(player.y, o.y) - Math.min(player.y + player.h, o.y + o.h));
          if (gapX < 5 && gapY < 5 && (gapX > 0 || gapY > 0)) {
            obstacles[i].nearMissTriggered = true;
            score += 2;
            scorePops.push({ x: player.x + player.w / 2, y: player.y - 14, text: 'NEAR MISS! +2', life: 70, maxLife: 70, big: true });
            playBeep(660, 0.08, 'sine');
          }
        }
        if (obstacles[i].horizontal
            ? (obstacles[i].x > canvas.width + obstacles[i].w || obstacles[i].x < -obstacles[i].w * 2)
            : obstacles[i].y > canvas.height) {
          const obsMidX = obstacles[i].x + obstacles[i].w / 2;
          const playerMidX = player.x + player.w / 2;
          if (Math.abs(obsMidX - playerMidX) < 60) {
            comboCount = comboTimer > 0 ? comboCount + 1 : 1;
            comboTimer = COMBO_WINDOW;
            if (comboCount >= 2) {
              triggerAchievement('firstcombo', '🔥 Eerste combo!');
              const bonus = comboCount * 2;
              score += bonus;
              comboDisplay = `COMBO x${comboCount}! +${bonus}`;
              comboDisplayTimer = 90;
              scorePops.push({ x: player.x + player.w / 2, y: player.y - 4, text: '+' + bonus, life: 60, maxLife: 60, big: true });
              if (comboCount >= 3) playComboChord(comboCount);
              else playBeep(880, 0.1);
            }
          }
          dodgeStreak++;
          obstacles.splice(i, 1);
        } else if (!invincible && !hitInvincible && collides(player, obstacles[i])) {
            dodgeStreak = 0;
            lives--;
            heartBlinkIndex = lives;
            heartBlinkTimer = 30;
            spawnParticles(player.x, player.y);
            playBeep(180, 0.4);
            obstacles.splice(i, 1);
            shakeTimer = SHAKE_DURATION;
            if (lives <= 0) {
              gameOverSpin = true; gameOverSpinTimer = GAME_OVER_SPIN_DURATION; stopBgMusic();
              const cx = player.x + player.w / 2, cy = player.y + player.h / 2;
              explosionRings.push({ x: cx, y: cy, r: 10, maxR: 90, life: 60, maxLife: 60 });
              explosionRings.push({ x: cx, y: cy, r: 5, maxR: 140, life: 80, maxLife: 80 });
              if (score > highscore) { highscore = score; localStorage.setItem('blokrenner_hs', highscore); isNewHighscore = true; } else { isNewHighscore = false; }
              const survivedSecs = Math.floor(sessionTimer / 60);
              if (survivedSecs > bestTime) { bestTime = survivedSecs; localStorage.setItem('blokrenner_bt', bestTime); isNewBestTime = true; } else { isNewBestTime = false; }
              showNameEntry(score);
            } else {
              hitInvincible = true;
              hitInvincibleTimer = HIT_INVINCIBLE_DURATION;
            }
            break;
          }
      }
    }

    function drawStartScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4af';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(INTRO_TITLE.slice(0, introLetters), canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('Ontwijkt de rode blokken!', canvas.width / 2, canvas.height / 2);
      if (bestTime > 0) {
        ctx.fillStyle = isNewBestTime ? '#0f8' : '#aaa';
        ctx.font = (isNewBestTime ? 'bold ' : '') + '11px sans-serif';
        ctx.fillText('⏱ Beste tijd: ' + bestTime + 's' + (isNewBestTime ? '  ★ Nieuw record!' : ''), canvas.width / 2, canvas.height / 2 + 12);
      }
      const top3 = loadHighscores();
      if (top3.length > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText('Top scores:', canvas.width / 2, canvas.height / 2 + 16);
        ctx.font = '13px sans-serif';
        top3.forEach((e, i) => {
          const medals = ['🥇','🥈','🥉'];
          ctx.fillText(medals[i] + ' ' + e.name + ': ' + e.score, canvas.width / 2, canvas.height / 2 + 30 + i * 15);
        });
      }

      // Muntjes teller
      ctx.fillStyle = '#ffe040';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🪙 ' + totalCoins + ' muntjes', canvas.width / 2, canvas.height / 2 + 68);

      // Dagelijkse uitdaging op startscherm
      {
        const ch = dailyChallenge;
        ctx.fillStyle = dailyChallengeCompleted ? '#0f8' : '#f80';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        const status = dailyChallengeCompleted ? '✓ Klaar!' : '+' + ch.reward + '🪙';
        ctx.fillText('🎯 Daag: ' + ch.desc(ch.target) + '  ' + status, canvas.width / 2, canvas.height / 2 + 82);
        ctx.textAlign = 'left';
      }

      // Start knop
      const bx = canvas.width / 2 - 70, by = canvas.height / 2 + 80, bw = 110, bh = 36;
      ctx.fillStyle = '#4af';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('START', bx + bw / 2, by + 25);

      // Winkel knop
      const wx = bx + bw + 8, wy = by, ww = 44, wh = 36;
      ctx.fillStyle = '#f80';
      ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = '#000';
      ctx.font = '20px sans-serif';
      ctx.fillText('🛒', wx + ww / 2, wy + 26);
      ctx.textAlign = 'left';

      // Winkel overlay
      if (shopOpen) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(20, 20, canvas.width - 40, canvas.height - 40);
        ctx.strokeStyle = '#f80';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
        ctx.fillStyle = '#f80';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🛒 Winkel', canvas.width / 2, 50);
        ctx.fillStyle = '#ffe040';
        ctx.font = '12px sans-serif';
        ctx.fillText('Muntjes: ' + totalCoins, canvas.width / 2, 68);

        // Item 1: Startschild
        const canShield = totalCoins >= SHOP_SHIELD_COST;
        ctx.fillStyle = shopShield ? '#0f8' : (canShield ? '#4af' : '#555');
        ctx.fillRect(40, 82, canvas.width - 80, 38);
        ctx.fillStyle = shopShield ? '#000' : '#fff';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText(shopShield ? '✓ Startschild actief' : 'Startschild — ' + SHOP_SHIELD_COST + ' 🪙', canvas.width / 2, 97);
        ctx.font = '10px sans-serif';
        ctx.fillStyle = shopShield ? '#000' : '#aaa';
        ctx.fillText('Begin de ronde met een schild', canvas.width / 2, 111);

        // Item 2: Extra leven
        const canLife = totalCoins >= SHOP_LIFE_COST + (shopShield ? SHOP_SHIELD_COST : 0);
        const lifeAffordable = totalCoins >= SHOP_LIFE_COST;
        ctx.fillStyle = shopExtraLife ? '#0f8' : (lifeAffordable ? '#f44' : '#555');
        ctx.fillRect(40, 130, canvas.width - 80, 38);
        ctx.fillStyle = shopExtraLife ? '#000' : '#fff';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText(shopExtraLife ? '✓ Extra leven actief' : 'Extra leven — ' + SHOP_LIFE_COST + ' 🪙', canvas.width / 2, 145);
        ctx.font = '10px sans-serif';
        ctx.fillStyle = shopExtraLife ? '#000' : '#aaa';
        ctx.fillText('Begin de ronde met 4 levens', canvas.width / 2, 159);

        // Sluit knop
        ctx.fillStyle = '#333';
        ctx.fillRect(canvas.width / 2 - 40, 178, 80, 28);
        ctx.fillStyle = '#fff';
        ctx.font = '13px sans-serif';
        ctx.fillText('Sluiten', canvas.width / 2, 196);
        ctx.textAlign = 'left';
      }

      // Klik op knop
      canvas.onclick = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = (e.clientX - r.left) * (canvas.width / r.width);
        const my = (e.clientY - r.top) * (canvas.height / r.height);
        if (shopOpen) {
          // Item 1 klik
          if (mx >= 40 && mx <= canvas.width - 40 && my >= 82 && my <= 120) {
            if (!shopShield && totalCoins >= SHOP_SHIELD_COST) {
              shopShield = true; totalCoins -= SHOP_SHIELD_COST;
              localStorage.setItem('blokrenner_coins', totalCoins);
            } else if (shopShield) { shopShield = false; totalCoins += SHOP_SHIELD_COST; localStorage.setItem('blokrenner_coins', totalCoins); }
          }
          // Item 2 klik
          if (mx >= 40 && mx <= canvas.width - 40 && my >= 130 && my <= 168) {
            if (!shopExtraLife && totalCoins >= SHOP_LIFE_COST) {
              shopExtraLife = true; totalCoins -= SHOP_LIFE_COST;
              localStorage.setItem('blokrenner_coins', totalCoins);
            } else if (shopExtraLife) { shopExtraLife = false; totalCoins += SHOP_LIFE_COST; localStorage.setItem('blokrenner_coins', totalCoins); }
          }
          // Sluiten klik
          if (mx >= canvas.width / 2 - 40 && mx <= canvas.width / 2 + 40 && my >= 178 && my <= 206) {
            shopOpen = false;
          }
          return;
        }
        if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
          gameStarted = true; startBgMusic();
          canvas.onclick = null;
        }
        if (mx >= wx && mx <= wx + ww && my >= wy && my <= wy + wh) {
          shopOpen = true;
        }
      };
    }

    function draw() {
      if (!gameStarted) { drawStartScreen(); return; }
      const level = Math.floor(score / 10) + 1;
      const t = Math.min((level - 1) / 9, 1);
      let bgR, bgG, bgB;
      if (nightMode) {
        bgR = Math.round(20 + t * 50); bgG = 0; bgB = Math.round(40 + t * 40);
      } else {
        bgR = Math.round(t * 80); bgG = Math.round((1 - t) * 10); bgB = Math.round((1 - t) * 60);
      }
      ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const shakeX = shakeTimer > 0 ? (Math.random() - 0.5) * 6 * (shakeTimer / SHAKE_DURATION) : 0;
      const shakeY = shakeTimer > 0 ? (Math.random() - 0.5) * 4 * (shakeTimer / SHAKE_DURATION) : 0;
      ctx.save();
      ctx.translate(shakeX, shakeY);
      drawStars();
      // Waarschuwingslijnen voor snelle obstakels
      for (const o of obstacles) {
        if (o.warn) {
          ctx.save();
          ctx.setLineDash([5, 5]);
          ctx.strokeStyle = 'rgba(255,60,60,0.35)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(o.x + o.w / 2, 0);
          ctx.lineTo(o.x + o.w / 2, canvas.height);
          ctx.stroke();
          ctx.restore();
        }
      }
      ctx.fillStyle = '#e44';
      for (const o of obstacles) {
        const ocx = o.x + o.w / 2, ocy = o.y + o.h / 2;
        ctx.save();
        ctx.translate(ocx, ocy);
        ctx.rotate(o.rotation);
        ctx.translate(-ocx, -ocy);
        // schaduw
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.fillRect(o.x + 4, o.y + 4, o.w, o.h);
        ctx.restore();
        const glowMap = { rect: '#e44', triangle: '#f80', circle: '#c4f', zigzag: '#0ef' };
        ctx.save();
        if (o.speed > 6) ctx.translate((Math.random() - 0.5) * 2, 0);
        ctx.shadowColor = glowMap[o.type] || '#e44';
        ctx.shadowBlur = Math.min(10 + (level - 1) * 2, 20);
        ctx.fillStyle = o.type === 'triangle' ? '#f80' : o.type === 'circle' ? '#c4f' : o.type === 'zigzag' ? '#0ef' : '#e44';
        if (o.type === 'triangle') {
          ctx.beginPath();
          ctx.moveTo(o.x + o.w / 2, o.y);
          ctx.lineTo(o.x + o.w, o.y + o.h);
          ctx.lineTo(o.x, o.y + o.h);
          ctx.closePath();
          ctx.fill();
        } else if (o.type === 'circle') {
          ctx.beginPath();
          ctx.arc(o.x + o.w / 2, o.y + o.h / 2, o.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (o.type === 'zigzag') {
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          const zSteps = 4, zW = o.w / zSteps;
          ctx.moveTo(o.x, o.y + o.h / 2);
          for (let z = 0; z < zSteps; z++) {
            ctx.lineTo(o.x + zW * z + zW / 2, z % 2 === 0 ? o.y + 4 : o.y + o.h - 4);
            ctx.lineTo(o.x + zW * (z + 1), o.y + o.h / 2);
          }
          ctx.stroke();
        } else if (o.type === 'boss') {
          ctx.shadowColor = '#ff0000';
          ctx.shadowBlur = 24 + 10 * Math.sin(Date.now() / 120);
          ctx.fillStyle = '#cc0000';
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = '#ff4444';
          ctx.lineWidth = 3;
          ctx.strokeRect(o.x + 3, o.y + 3, o.w - 6, o.h - 6);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 18px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('BOSS', o.x + o.w / 2, o.y + o.h / 2 + 6);
          ctx.textAlign = 'left';
        } else {
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
        ctx.restore();
        ctx.restore(); // sluit rotatie-context
        if (o.warn && o.y < 20) {
          ctx.fillStyle = '#f80';
          ctx.beginPath();
          const mx = o.x + o.w / 2;
          ctx.moveTo(mx, 0);
          ctx.lineTo(mx - 7, 12);
          ctx.lineTo(mx + 7, 12);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#e44';
        }
      }

      // Sterrenspoor achter muntjes
      for (const t of coinTrails) {
        ctx.save();
        ctx.globalAlpha = (t.life / 22) * 0.8;
        ctx.fillStyle = '#ffe040';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 4;
        ctx.translate(t.x, t.y);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-t.size/2, -t.size/2, t.size, t.size);
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // Muntjes tekenen (gele diamanten)
      for (const coin of coins) {
        ctx.save();
        ctx.translate(coin.x + coin.w / 2, coin.y + coin.h / 2);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = '#ffe040';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 8;
        ctx.fillRect(-coin.w / 2, -coin.h / 2, coin.w, coin.h);
        ctx.restore();
      }

      // Power-up tekenen
      if (powerUp) {
        if (powerUp.type === 'multiplier') {
          ctx.save();
          ctx.translate(powerUp.x + powerUp.w / 2, powerUp.y + powerUp.h / 2);
          ctx.fillStyle = '#c060ff';
          ctx.shadowColor = '#c060ff';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          for (let pt = 0; pt < 10; pt++) {
            const angle = (pt * Math.PI) / 5 - Math.PI / 2;
            const r = pt % 2 === 0 ? 10 : 4;
            ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
          }
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 7px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('x2', 0, 3);
          ctx.restore();
        } else if (powerUp.type === 'slowmo') {
          ctx.save();
          ctx.fillStyle = '#88eeff';
          ctx.shadowColor = '#88eeff';
          ctx.shadowBlur = 10;
          ctx.fillRect(powerUp.x, powerUp.y, powerUp.w, powerUp.h);
          ctx.fillStyle = '#003344';
          ctx.font = 'bold 13px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('⏳', powerUp.x + powerUp.w / 2, powerUp.y + 15);
          ctx.restore();
        } else {
          ctx.fillStyle = powerUp.type === 'speed' ? '#0cf' : '#0f0';
          ctx.fillRect(powerUp.x, powerUp.y, powerUp.w, powerUp.h);
          ctx.fillStyle = '#fff';
          ctx.font = '12px sans-serif';
          ctx.fillText(powerUp.type === 'speed' ? '►' : '★', powerUp.x + 4, powerUp.y + 15);
        }
      }

      // Multiplier balk onder speler
      if (scoreMultiplier > 1) {
        const barW = player.w + 8;
        const barX = player.x - 4;
        const barY = player.y + player.h + (invincible || speedBoost ? 12 : 4);
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = '#c060ff';
        ctx.fillRect(barX, barY, barW * (scoreMultiplierTimer / SCORE_MULTIPLIER_DURATION), 4);
        ctx.save();
        ctx.fillStyle = '#c060ff';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('x2', barX + barW + 3, barY + 4);
        ctx.restore();
      }

      // Trail tekenen
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        ctx.globalAlpha = (t.life / 10) * 0.4;
        ctx.fillStyle = player.color || '#4af';
        ctx.fillRect(t.x, t.y, player.w, player.h);
      }
      ctx.globalAlpha = 1;

      player.color = nightMode ? '#ffcc00' : skinColor;

      // Speler knippert als invincible of geraakt
      const blinkHit = hitInvincible && Math.floor(hitInvincibleTimer / 5) % 2 === 0;
      const blinkPow = invincible && Math.floor(invincibleTimer / 6) % 2 === 0;
      if (!blinkHit && (!invincible || blinkPow)) {
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
        ctx.rotate(player.rotation);
        const pulseScale = playerIdleTimer > 0 ? 1 + 0.08 * Math.sin(playerIdleTimer * Math.PI * 2 / 60) : 1;
        ctx.scale(pulseScale, pulseScale);
        if (invincible) {
          ctx.shadowColor = '#ff0';
          ctx.shadowBlur = 18 + 8 * Math.sin(Date.now() / 80);
        } else if (speedBoost) {
          ctx.shadowColor = '#0cf';
          ctx.shadowBlur = 18 + 8 * Math.sin(Date.now() / 80);
        }
        ctx.fillStyle = invincible ? '#ff0' : speedBoost ? '#0cf' : player.color;
        ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
        ctx.restore();
      }

      // Power-up aftelbalk onder speler
      if (invincible || speedBoost) {
        const timer = invincible ? invincibleTimer : speedBoostTimer;
        const maxDur = invincible ? INVINCIBLE_DURATION : SPEED_BOOST_DURATION;
        const barW = player.w + 8;
        const barX = player.x - 4;
        const barY = player.y + player.h + 4;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = invincible ? '#ff0' : '#0cf';
        ctx.fillRect(barX, barY, barW * (timer / maxDur), 4);
        const secsLeft = Math.ceil(timer / 60);
        ctx.save();
        ctx.fillStyle = invincible ? '#ff0' : '#0cf';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(secsLeft + 's', barX + barW + 3, barY + 4);
        ctx.restore();
      }

      // Shield verdwijnt waarschuwing
      if (invincible && invincibleTimer < 30 && Math.floor(invincibleTimer / 4) % 2 === 0) {
        ctx.save();
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('SHIELD VERDWIJNT!', canvas.width / 2, player.y - 10);
        ctx.restore();
      }

      // Particles tekenen
      for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      // Confetti tekenen
      for (const c of confetti) {
        ctx.globalAlpha = Math.min(1, c.life / 30);
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x, c.y, c.size, c.size);
      }
      ctx.globalAlpha = 1;

      for (const sp of scorePops) {
        ctx.save();
        ctx.globalAlpha = sp.life / sp.maxLife;
        ctx.fillStyle = sp.big ? '#f80' : '#ff0';
        ctx.font = `bold ${sp.big ? 16 : 13}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(sp.text, sp.x, sp.y);
        ctx.restore();
      }
      const flashScale = scoreFlash > 0 ? 1 + 0.5 * (scoreFlash / 12) : 1;
      const flashColor = scoreFlash > 0 ? '#ff0' : '#fff';
      const scoreShakeX = scoreFlash > 0 ? Math.sin(scoreFlash * 2.2) * 4 * (scoreFlash / 12) : 0;
      ctx.save();
      ctx.translate(8 + 30 + scoreShakeX, 14);
      ctx.scale(flashScale, flashScale);
      ctx.fillStyle = flashColor;
      ctx.font = `bold ${Math.round(16 * flashScale)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Score: ' + score, 0, 0);
      ctx.restore();
      ctx.textAlign = 'left';

      // Snelheidsmeter (verticale balk links)
      const speedVal = Math.min(2 + score * 0.3, 10);
      const speedFrac = (speedVal - 2) / 8;
      const smH = canvas.height - 10, smW = 5, smX = 2, smY = 5;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(smX, smY, smW, smH);
      const fillH = smH * speedFrac;
      const sr = Math.round(speedFrac * 255), sg = Math.round((1 - speedFrac) * 200);
      ctx.fillStyle = `rgb(${sr},${sg},60)`;
      ctx.fillRect(smX, smY + smH - fillH, smW, fillH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(smX, smY, smW, smH);
      ctx.fillStyle = '#aaa';
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('spd', smX + smW / 2, smY + smH + 8);
      ctx.textAlign = 'left';

      // Combo-badge naast score
      if (comboCount >= 2 && comboTimer > 0) {
        const mult = Math.min(comboCount, 6);
        ctx.save();
        ctx.fillStyle = '#f80';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('x' + mult, 72, 9);
        ctx.restore();
      }

      ctx.fillStyle = '#4af';
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Level ' + level, canvas.width / 2, 20);
      ctx.textAlign = 'left';

      // Voortgangsbalk naar volgend level
      const levelProgress = (score % 10) / 10;
      const barW = 120, barH = 5;
      const barX = canvas.width / 2 - barW / 2, barY = 26;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#4af';
      ctx.fillRect(barX, barY, barW * levelProgress, barH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);

      // Hartjes levens
      ctx.font = '18px sans-serif';
      for (let i = 0; i < 3; i++) {
        let heartColor;
        if (i < lives) {
          heartColor = '#f44';
        } else if (i === heartBlinkIndex && heartBlinkTimer > 0 && Math.floor(heartBlinkTimer / 3) % 2 === 0) {
          heartColor = '#f44';
        } else {
          heartColor = '#555';
        }
        ctx.fillStyle = heartColor;
        ctx.fillText('♥', canvas.width - 28 - i * 22, 20);
      }

      // Dodge streak teller
      if (dodgeStreak > 0) {
        ctx.save();
        ctx.fillStyle = dodgeStreak >= 10 ? '#f80' : '#4af';
        ctx.font = `bold ${dodgeStreak >= 10 ? 13 : 11}px sans-serif`;
        ctx.textAlign = 'right';
        ctx.fillText('🔥 streak: ' + dodgeStreak, canvas.width - 4, 36);
        ctx.restore();
      }

      // Dagelijkse uitdaging balk (onderin)
      {
        const ch = dailyChallenge;
        const prog = Math.min(dailyChallengeProgress, ch.target);
        const frac = prog / ch.target;
        const bx = canvas.width / 2 - 100, by = canvas.height - 14, bw = 200, bh = 8;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx - 2, by - 12, bw + 4, 22);
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, bw, bh);
        ctx.fillStyle = dailyChallengeCompleted ? '#0f8' : '#f80';
        ctx.fillRect(bx, by, bw * frac, bh);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = dailyChallengeCompleted ? '#0f8' : '#fff';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        const label = dailyChallengeCompleted ? '✓ ' + ch.desc(ch.target) + ' (+' + ch.reward + '🪙)' : ch.desc(ch.target) + ' (' + prog + '/' + ch.target + ')';
        ctx.fillText(label, canvas.width / 2, by - 2);
        ctx.textAlign = 'left';
      }
      if (dailyChallengeFlash > 0) {
        const alpha = Math.sin((dailyChallengeFlash / 180) * Math.PI) * 0.9;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(0,200,100,0.9)';
        const fw = 280, fh = 40, fx = canvas.width / 2 - fw / 2, fy = canvas.height / 2 - 60;
        ctx.beginPath();
        ctx.roundRect(fx, fy, fw, fh, 8);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🎯 Uitdaging voltooid! +' + dailyChallenge.reward + ' 🪙', canvas.width / 2, fy + 25);
        ctx.restore();
        ctx.textAlign = 'left';
      }

      // Mini-kaart (20×10px) rechtsboven
      const mmX = canvas.width - 22, mmY = 32, mmW = 20, mmH = 10;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(mmX, mmY, mmW, mmH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(mmX, mmY, mmW, mmH);
      for (const o of obstacles) {
        ctx.fillStyle = '#e44';
        ctx.fillRect(mmX + (o.x / canvas.width) * mmW, mmY + (o.y / canvas.height) * mmH, 1, 1);
      }
      ctx.fillStyle = skinColor || '#4af';
      ctx.fillRect(mmX + (player.x / canvas.width) * mmW, mmY + (player.y / canvas.height) * mmH, 2, 1);

      if (comboDisplayTimer > 0) {
        ctx.globalAlpha = Math.min(1, comboDisplayTimer / 20);
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(comboDisplay, canvas.width / 2, 44);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
      }

      if (levelBannerTimer > 0) {
        const alpha = levelBannerTimer > 30 ? 1 : levelBannerTimer / 30;
        const scale = levelBannerTimer > 90 ? 1 + 0.4 * ((120 - levelBannerTimer) / 30) : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.fillStyle = '#4af';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(levelBanner, 0, 0);
        ctx.restore();
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      if (milestoneBannerTimer > 0) {
        const alpha = milestoneBannerTimer > 30 ? 1 : milestoneBannerTimer / 30;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#f80';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(milestoneBanner, canvas.width / 2, canvas.height / 2 + 40);
        ctx.restore();
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      if (achievementTimer > 0 && achievementQueue.length > 0) {
        const fadeIn = ACHIEVEMENT_DURATION - achievementTimer;
        const alpha = fadeIn < 20 ? fadeIn / 20 : achievementTimer < 30 ? achievementTimer / 30 : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(255,200,0,0.92)';
        const aw = 220, ah = 30, ax = canvas.width / 2 - aw / 2, ay = 50;
        ctx.beginPath();
        ctx.roundRect(ax, ay, aw, ah, 8);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🏆 ' + achievementQueue[0], canvas.width / 2, ay + 20);
        ctx.restore();
      }

      if (bossWarningTimer > 0) {
        const blink = Math.floor(bossWarningTimer / 12) % 2 === 0;
        if (blink) {
          ctx.save();
          ctx.fillStyle = 'rgba(180,0,0,0.25)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#ff2222';
          ctx.font = 'bold 26px sans-serif';
          ctx.textAlign = 'center';
          ctx.shadowColor = '#ff0000';
          ctx.shadowBlur = 16;
          ctx.fillText('⚠ BOSS NADERT! ⚠', canvas.width / 2, canvas.height / 2);
          ctx.font = '14px sans-serif';
          ctx.fillStyle = '#ffaaaa';
          ctx.shadowBlur = 0;
          ctx.fillText(Math.ceil(bossWarningTimer / 60) + 's', canvas.width / 2, canvas.height / 2 + 24);
          ctx.restore();
        }
      }

      if (paused && !gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('PAUZE', canvas.width / 2, canvas.height / 2 - 26);
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#4af';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 2);
        ctx.fillStyle = '#ff0';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 22);
        ctx.fillStyle = '#aaa';
        ctx.font = '13px sans-serif';
        ctx.fillText('Druk P of Esc om door te gaan', canvas.width / 2, canvas.height / 2 + 44);
        ctx.textAlign = 'left';
      }

      if (levelFlash > 0) {
        ctx.fillStyle = `rgba(0,255,180,${(levelFlash / 22) * 0.45})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (powerUpFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${0.6 * Math.sin((powerUpFlash / 12) * Math.PI)})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (gameOverFlash > 0) {
        ctx.fillStyle = `rgba(220,0,0,${(gameOverFlash / 30) * 0.6})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      for (const ring of explosionRings) {
        ctx.save();
        ctx.globalAlpha = (ring.life / ring.maxLife) * 0.7;
        ctx.strokeStyle = '#ff4';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '18px sans-serif';
        if (isNewHighscore) {
          ctx.save();
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 24;
          ctx.fillStyle = '#ffd700';
          ctx.fillText('Score: ' + score + '  ★ NIEUW RECORD ★', canvas.width / 2, canvas.height / 2 + 15);
          ctx.restore();
        } else {
          ctx.fillStyle = '#fff';
          ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
        }
        ctx.fillStyle = '#ff0';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 35);
        ctx.fillStyle = '#fff';
        ctx.fillText('Druk Enter om opnieuw te spelen', canvas.width / 2, canvas.height / 2 + 55);
        // Opnieuw-knop op canvas
        const rbx = canvas.width / 2 - 60, rby = canvas.height / 2 + 65, rbw = 120, rbh = 34;
        ctx.fillStyle = '#4af';
        ctx.beginPath();
        ctx.roundRect(rbx, rby, rbw, rbh, 6);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText('▶ Opnieuw', canvas.width / 2, rby + 22);
        ctx.textAlign = 'left';
        canvas.onclick = (e) => {
          const r = canvas.getBoundingClientRect();
          const mx = (e.clientX - r.left) * (canvas.width / r.width);
          const my = (e.clientY - r.top) * (canvas.height / r.height);
          if (mx >= rbx && mx <= rbx + rbw && my >= rby && my <= rby + rbh) {
            canvas.onclick = null;
            reset();
          }
        };
      }
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Skin keuze knoppen
    const skinSelectDiv = document.getElementById('skin-select');
    skinColors.forEach((color, i) => {
      const btn = document.createElement('div');
      btn.style.cssText = `width:22px;height:22px;background:${color};border-radius:4px;cursor:pointer;color:${color};`;
      if (i === 0) btn.classList.add('skin-selected');
      btn.addEventListener('click', () => {
        skinColor = color;
        skinSelectDiv.querySelectorAll('div').forEach((d, j) => {
          d.classList.toggle('skin-selected', j === i);
        });
      });
      skinSelectDiv.appendChild(btn);
    });

    loop();
  </script>
</body>
</html>
