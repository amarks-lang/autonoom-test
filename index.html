<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Blok Renner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 10px; font-size: 1.5rem; }
    canvas { background: #222; border: 2px solid #555; max-width: 100%; }
    @media (max-width: 500px) {
      canvas { width: 100vw !important; height: auto !important; }
      h1 { font-size: 1.1rem; }
      #dpad button, #btn-pause { width: 50px; height: 50px; font-size: 20px; }
      #dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
    }
    #controls { display: flex; align-items: center; gap: 16px; margin-top: 16px; }
    #dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 4px; user-select: none; }
    #btn-pause { width: 60px; height: 60px; background: #333; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; touch-action: none; align-self: center; }
    #dpad button { background: #333; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; touch-action: none; }
    #dpad button:active { background: #4af; }
  </style>
</head>
<body>
  <h1>Blok Renner</h1>
  <canvas id="c" width="480" height="200"></canvas>
  <p id="info">Gebruik pijltjestoetsen of knoppen om te bewegen</p>
  <div id="skin-select" style="display:flex;gap:8px;align-items:center;margin:4px 0;font-size:13px;color:#aaa;">
    <span>Kleur:</span>
  </div>
  <div id="controls">
    <div id="dpad">
      <span></span>
      <button id="btn-up">▲</button>
      <span></span>
      <button id="btn-left">◀</button>
      <button id="btn-down">▼</button>
      <button id="btn-right">▶</button>
      <span></span><span></span><span></span>
    </div>
    <button id="btn-pause">⏸</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Achtergrondmuziek: bas-puls die sneller tikt op hogere levels
    let bgBeatInterval = null;
    function startBgMusic() {
      if (bgBeatInterval) return;
      function tick() {
        if (!gameStarted || gameOver || paused) return;
        const level = Math.floor(score / 10) + 1;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 60 + (level - 1) * 10;
        gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        const interval = Math.max(300, 800 - (level - 1) * 80);
        bgBeatInterval = setTimeout(tick, interval);
      }
      tick();
    }
    function stopBgMusic() { clearTimeout(bgBeatInterval); bgBeatInterval = null; }
    function playBeep(freq, duration, type = 'square') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const player = { x: 40, y: 140, w: 30, h: 30, speed: 4, color: '#4af', rotation: 0, rotVel: 0 };

    const obstacles = [];
    let spawnTimer = 0;
    let score = 0;
    let scoreTimer = 0;
    let gameOver = false;
    let gameStarted = false;
    let highscore = parseInt(localStorage.getItem('blokrenner_hs') || '0');
    function loadHighscores() {
      try { return JSON.parse(localStorage.getItem('blokrenner_top3') || '[]'); } catch(e) { return []; }
    }
    function saveHighscores(sc) {
      const list = loadHighscores();
      list.push(sc);
      list.sort((a, b) => b - a);
      const top3 = list.slice(0, 3);
      localStorage.setItem('blokrenner_top3', JSON.stringify(top3));
    }
    let lives = 3;
    let hitInvincible = false;
    let hitInvincibleTimer = 0;
    const HIT_INVINCIBLE_DURATION = 90;

    // Sterren achtergrond (twee lagen voor parallax)
    const stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * 480,
      y: Math.random() * 200,
      size: 1 + Math.random() * 2,
      speed: 0.3 + Math.random() * 0.7
    }));
    const starsBack = Array.from({ length: 35 }, () => ({
      x: Math.random() * 480,
      y: Math.random() * 200,
      size: 0.5 + Math.random() * 1,
      speed: 0.1 + Math.random() * 0.2
    }));
    function updateStars() {
      for (const s of stars) { s.y += s.speed; if (s.y > 200) { s.y = 0; s.x = Math.random() * 480; } }
      for (const s of starsBack) { s.y += s.speed; if (s.y > 200) { s.y = 0; s.x = Math.random() * 480; } }
    }
    function drawStars() {
      ctx.fillStyle = '#555';
      for (const s of starsBack) ctx.fillRect(s.x, s.y, s.size, s.size);
      ctx.fillStyle = '#aaa';
      for (const s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Particles
    const particles = [];
    function spawnParticles(x, y) {
      const colors = ['#ff4','#f80','#f44','#f0f','#4ff'];
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x: x + 15, y: y + 15,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 30 + Math.random() * 20
        });
      }
    }

    // Power-up
    let powerUp = null;
    let powerUpTimer = 0;
    let invincible = false;
    let invincibleTimer = 0;
    let speedBoost = false;
    let speedBoostTimer = 0;
    const POWERUP_INTERVAL = 300;
    const INVINCIBLE_DURATION = 180;
    const SPEED_BOOST_DURATION = 180;

    // Pauze
    let paused = false;
    let scoreFlash = 0;
    const scorePops = [];
    const trail = [];
    const skinColors = ['#4af', '#f80', '#0f8'];
    let skinColor = skinColors[0];

    // Combo-systeem
    let comboCount = 0;
    let comboTimer = 0;
    let comboDisplay = '';
    let comboDisplayTimer = 0;
    const COMBO_WINDOW = 120;
    let lastLevel = 1;
    let levelBanner = '';
    let levelBannerTimer = 0;
    let levelFlash = 0;
    let gameOverFlash = 0;
    let shakeTimer = 0;
    const SHAKE_DURATION = 12;

    function spawnObstacle() {
      const types = ['rect', 'rect', 'rect', 'triangle', 'circle', 'zigzag'];
      const type = types[Math.floor(Math.random() * types.length)];
      const size = (type === 'rect') ? [20, 20, 40, 16, 16, 40][Math.floor(Math.random()*3)*2] : 26;
      const w = type === 'rect' ? [20,40,16][Math.floor(Math.random()*3)] : size;
      const h = type === 'rect' ? [20,16,40][Math.floor(Math.random()*3)] : size;
      const spd = 2 + Math.random() * 2 + score * 0.3;
      const obs = {
        x: Math.random() * (canvas.width - w),
        y: -h,
        w, h,
        speed: spd,
        warn: spd > 5,
        type
      };
      if (type === 'zigzag') {
        obs.zigzagSpeed = 2 + Math.random() * 2;
        obs.zigzagDir = Math.random() < 0.5 ? 1 : -1;
      }
      obstacles.push(obs);
    }

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',  e => keys[e.key] = false);

    function bindBtn(id, key) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if (!gameStarted) { gameStarted = true; startBgMusic(); } }, { passive: false });
      btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
      btn.addEventListener('mousedown',  () => { keys[key] = true;  if (!gameStarted) { gameStarted = true; startBgMusic(); } });
      btn.addEventListener('mouseup',    () => { keys[key] = false; });
      btn.addEventListener('mouseleave', () => { keys[key] = false; });
    }
    bindBtn('btn-up',    'ArrowUp');
    bindBtn('btn-down',  'ArrowDown');
    bindBtn('btn-left',  'ArrowLeft');
    bindBtn('btn-right', 'ArrowRight');

    const pauseBtn = document.getElementById('btn-pause');
    pauseBtn.addEventListener('click', () => {
      if (gameStarted && !gameOver) paused = !paused;
    });
    pauseBtn.addEventListener('touchstart', e => { e.preventDefault(); if (gameStarted && !gameOver) paused = !paused; }, { passive: false });

    function collides(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playComboChord(combo) {
      const baseFreqs = [330, 392, 494, 587, 698, 831];
      const notes = Math.min(combo, baseFreqs.length);
      for (let i = 0; i < notes; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.value = baseFreqs[i];
        const t = audioCtx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
      }
    }

    function playFallingSweep() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(700, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function playRisingSweep() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function spawnPowerUp() {
      const type = Math.random() < 0.5 ? 'shield' : 'speed';
      powerUp = { x: Math.random() * (canvas.width - 20), y: -20, w: 20, h: 20, speed: 2, type };
      playRisingSweep();
    }

    function reset() {
      player.x = 40; player.y = 140; player.rotation = 0; player.rotVel = 0;
      obstacles.length = 0;
      spawnTimer = 0; scoreTimer = 0; score = 0;
      gameOver = false;
      gameStarted = true;
      stopBgMusic(); startBgMusic();
      powerUp = null; powerUpTimer = 0; invincible = false; invincibleTimer = 0; speedBoost = false; speedBoostTimer = 0;
      lastLevel = 1; levelBanner = ''; levelBannerTimer = 0; levelFlash = 0; gameOverFlash = 0; shakeTimer = 0;
      lives = 3; hitInvincible = false; hitInvincibleTimer = 0;
    }

    document.addEventListener('keydown', e => {
      if (!gameStarted && e.key === 'Enter') { gameStarted = true; startBgMusic(); }
      if (gameOver && e.key === 'Enter') reset();
      if (gameStarted && !gameOver && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        paused = !paused;
      }
    });

    function update() {
      updateStars();
      if (!gameStarted || gameOver || paused) return;

      const moving = keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'];
      if (moving) trail.push({ x: player.x, y: player.y, life: 10 });
      if (trail.length > 8) trail.shift();
      for (let i = trail.length - 1; i >= 0; i--) { trail[i].life--; if (trail[i].life <= 0) trail.splice(i, 1); }

      const currentSpeed = speedBoost ? player.speed * 2 : player.speed;
      if (keys['ArrowLeft'])  { player.x = Math.max(0, player.x - currentSpeed); player.rotVel -= 0.04; }
      if (keys['ArrowRight']) { player.x = Math.min(canvas.width - player.w, player.x + currentSpeed); player.rotVel += 0.04; }
      if (keys['ArrowUp'])    player.y = Math.max(0, player.y - currentSpeed);
      if (keys['ArrowDown'])  player.y = Math.min(canvas.height - player.h, player.y + currentSpeed);
      player.rotVel *= 0.88;
      player.rotation += player.rotVel;

      const spawnInterval = Math.max(20, 60 - score * 2);
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnObstacle();
        if (Math.floor(score / 10) + 1 >= 5) spawnObstacle();
        spawnTimer = 0;
      }

      scoreTimer++;
      if (scoreTimer >= 60) {
        score++; scoreTimer = 0; scoreFlash = 12;
        scorePops.push({ x: player.x + player.w / 2, y: player.y - 4, text: '+1', life: 50, maxLife: 50 });
        const newLevel = Math.floor(score / 10) + 1;
        if (newLevel > lastLevel) { lastLevel = newLevel; levelBanner = 'LEVEL ' + newLevel + '!'; levelBannerTimer = 120; levelFlash = 22; playBeep(523, 0.2); }
      }

      // Power-up spawnen
      powerUpTimer++;
      if (powerUpTimer >= POWERUP_INTERVAL && !powerUp) { spawnPowerUp(); powerUpTimer = 0; }

      // Power-up bewegen & ophalen
      if (powerUp) {
        powerUp.y += powerUp.speed;
        if (powerUp.y > canvas.height) { powerUp = null; }
        else if (collides(player, powerUp)) {
          if (powerUp.type === 'shield') {
            invincible = true; invincibleTimer = INVINCIBLE_DURATION;
          } else {
            speedBoost = true; speedBoostTimer = SPEED_BOOST_DURATION;
          }
          powerUp = null; playBeep(660, 0.15);
        }
      }

      // Particles updaten
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Invincibility aftellen
      if (invincible) { invincibleTimer--; if (invincibleTimer <= 0) { invincible = false; playFallingSweep(); } }
      if (speedBoost) { speedBoostTimer--; if (speedBoostTimer <= 0) { speedBoost = false; playFallingSweep(); } }
      if (hitInvincible) { hitInvincibleTimer--; if (hitInvincibleTimer <= 0) hitInvincible = false; }

      for (let i = scorePops.length - 1; i >= 0; i--) { scorePops[i].y -= 0.9; scorePops[i].life--; if (scorePops[i].life <= 0) scorePops.splice(i, 1); }
      if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
      if (comboDisplayTimer > 0) comboDisplayTimer--;
      if (levelBannerTimer > 0) levelBannerTimer--;
      if (levelFlash > 0) levelFlash--;
      if (gameOverFlash > 0) gameOverFlash--;
      if (shakeTimer > 0) shakeTimer--;
      if (scoreFlash > 0) scoreFlash--;

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacles[i].speed;
        if (obstacles[i].type === 'zigzag') {
          obstacles[i].x += obstacles[i].zigzagSpeed * obstacles[i].zigzagDir;
          if (obstacles[i].x <= 0 || obstacles[i].x + obstacles[i].w >= canvas.width) {
            obstacles[i].zigzagDir *= -1;
            obstacles[i].x = Math.max(0, Math.min(canvas.width - obstacles[i].w, obstacles[i].x));
          }
        }
        if (obstacles[i].y > canvas.height) {
          const obsMidX = obstacles[i].x + obstacles[i].w / 2;
          const playerMidX = player.x + player.w / 2;
          if (Math.abs(obsMidX - playerMidX) < 60) {
            comboCount = comboTimer > 0 ? comboCount + 1 : 1;
            comboTimer = COMBO_WINDOW;
            if (comboCount >= 2) {
              const bonus = comboCount * 2;
              score += bonus;
              comboDisplay = `COMBO x${comboCount}! +${bonus}`;
              comboDisplayTimer = 90;
              scorePops.push({ x: player.x + player.w / 2, y: player.y - 4, text: '+' + bonus, life: 60, maxLife: 60, big: true });
              if (comboCount >= 3) playComboChord(comboCount);
              else playBeep(880, 0.1);
            }
          }
          obstacles.splice(i, 1);
        } else if (!invincible && !hitInvincible && collides(player, obstacles[i])) {
            lives--;
            spawnParticles(player.x, player.y);
            playBeep(180, 0.4);
            obstacles.splice(i, 1);
            shakeTimer = SHAKE_DURATION;
            if (lives <= 0) {
              gameOver = true; gameOverFlash = 30; stopBgMusic();
              if (score > highscore) { highscore = score; localStorage.setItem('blokrenner_hs', highscore); }
              saveHighscores(score);
            } else {
              hitInvincible = true;
              hitInvincibleTimer = HIT_INVINCIBLE_DURATION;
            }
            break;
          }
      }
    }

    function drawStartScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4af';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Blok Renner', canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('Ontwijkt de rode blokken!', canvas.width / 2, canvas.height / 2);
      const top3 = loadHighscores();
      if (top3.length > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText('Top scores:', canvas.width / 2, canvas.height / 2 + 16);
        ctx.font = '13px sans-serif';
        top3.forEach((s, i) => {
          const medals = ['🥇','🥈','🥉'];
          ctx.fillText(medals[i] + ' ' + s, canvas.width / 2, canvas.height / 2 + 30 + i * 15);
        });
      }

      // Start knop
      const bx = canvas.width / 2 - 70, by = canvas.height / 2 + 75, bw = 140, bh = 40;
      ctx.fillStyle = '#4af';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('START', canvas.width / 2, by + 28);
      ctx.textAlign = 'left';

      // Klik op knop
      canvas.onclick = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
          gameStarted = true; startBgMusic();
          canvas.onclick = null;
        }
      };
    }

    function draw() {
      if (!gameStarted) { drawStartScreen(); return; }
      const level = Math.floor(score / 10) + 1;
      const t = Math.min((level - 1) / 9, 1);
      const r = Math.round(t * 80);
      const g = Math.round((1 - t) * 10);
      const b = Math.round((1 - t) * 60);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const shakeX = shakeTimer > 0 ? (Math.random() - 0.5) * 6 * (shakeTimer / SHAKE_DURATION) : 0;
      const shakeY = shakeTimer > 0 ? (Math.random() - 0.5) * 4 * (shakeTimer / SHAKE_DURATION) : 0;
      ctx.save();
      ctx.translate(shakeX, shakeY);
      drawStars();
      // Waarschuwingslijnen voor snelle obstakels
      for (const o of obstacles) {
        if (o.warn) {
          ctx.save();
          ctx.setLineDash([5, 5]);
          ctx.strokeStyle = 'rgba(255,60,60,0.35)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(o.x + o.w / 2, 0);
          ctx.lineTo(o.x + o.w / 2, canvas.height);
          ctx.stroke();
          ctx.restore();
        }
      }
      ctx.fillStyle = '#e44';
      for (const o of obstacles) {
        // schaduw
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.fillRect(o.x + 4, o.y + 4, o.w, o.h);
        ctx.restore();
        ctx.fillStyle = o.type === 'triangle' ? '#f80' : o.type === 'circle' ? '#c4f' : o.type === 'zigzag' ? '#0ef' : '#e44';
        if (o.type === 'triangle') {
          ctx.beginPath();
          ctx.moveTo(o.x + o.w / 2, o.y);
          ctx.lineTo(o.x + o.w, o.y + o.h);
          ctx.lineTo(o.x, o.y + o.h);
          ctx.closePath();
          ctx.fill();
        } else if (o.type === 'circle') {
          ctx.beginPath();
          ctx.arc(o.x + o.w / 2, o.y + o.h / 2, o.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (o.type === 'zigzag') {
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          const zSteps = 4, zW = o.w / zSteps;
          ctx.moveTo(o.x, o.y + o.h / 2);
          for (let z = 0; z < zSteps; z++) {
            ctx.lineTo(o.x + zW * z + zW / 2, z % 2 === 0 ? o.y + 4 : o.y + o.h - 4);
            ctx.lineTo(o.x + zW * (z + 1), o.y + o.h / 2);
          }
          ctx.stroke();
        } else {
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
        if (o.warn && o.y < 20) {
          ctx.fillStyle = '#f80';
          ctx.beginPath();
          const mx = o.x + o.w / 2;
          ctx.moveTo(mx, 0);
          ctx.lineTo(mx - 7, 12);
          ctx.lineTo(mx + 7, 12);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#e44';
        }
      }

      // Power-up tekenen
      if (powerUp) {
        ctx.fillStyle = powerUp.type === 'speed' ? '#0cf' : '#0f0';
        ctx.fillRect(powerUp.x, powerUp.y, powerUp.w, powerUp.h);
        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.fillText(powerUp.type === 'speed' ? '►' : '★', powerUp.x + 4, powerUp.y + 15);
      }

      // Trail tekenen
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        ctx.globalAlpha = (t.life / 10) * 0.4;
        ctx.fillStyle = player.color || '#4af';
        ctx.fillRect(t.x, t.y, player.w, player.h);
      }
      ctx.globalAlpha = 1;

      player.color = skinColor;

      // Speler knippert als invincible of geraakt
      const blinkHit = hitInvincible && Math.floor(hitInvincibleTimer / 5) % 2 === 0;
      const blinkPow = invincible && Math.floor(invincibleTimer / 6) % 2 === 0;
      if (!blinkHit && (!invincible || blinkPow)) {
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
        ctx.rotate(player.rotation);
        if (invincible) {
          ctx.shadowColor = '#ff0';
          ctx.shadowBlur = 18 + 8 * Math.sin(Date.now() / 80);
        }
        ctx.fillStyle = invincible ? '#ff0' : player.color;
        ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
        ctx.restore();
      }

      // Power-up aftelbalk onder speler
      if (invincible || speedBoost) {
        const timer = invincible ? invincibleTimer : speedBoostTimer;
        const maxDur = invincible ? INVINCIBLE_DURATION : SPEED_BOOST_DURATION;
        const barW = player.w + 8;
        const barX = player.x - 4;
        const barY = player.y + player.h + 4;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = invincible ? '#ff0' : '#0cf';
        ctx.fillRect(barX, barY, barW * (timer / maxDur), 4);
      }

      // Particles tekenen
      for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      for (const sp of scorePops) {
        ctx.save();
        ctx.globalAlpha = sp.life / sp.maxLife;
        ctx.fillStyle = sp.big ? '#f80' : '#ff0';
        ctx.font = `bold ${sp.big ? 16 : 13}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(sp.text, sp.x, sp.y);
        ctx.restore();
      }
      const flashScale = scoreFlash > 0 ? 1 + 0.5 * (scoreFlash / 12) : 1;
      const flashColor = scoreFlash > 0 ? '#ff0' : '#fff';
      ctx.save();
      ctx.translate(8 + 30, 14);
      ctx.scale(flashScale, flashScale);
      ctx.fillStyle = flashColor;
      ctx.font = `bold ${Math.round(16 * flashScale)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Score: ' + score, 0, 0);
      ctx.restore();
      ctx.textAlign = 'left';

      // Snelheidsmeter (verticale balk links)
      const speedVal = Math.min(2 + score * 0.3, 10);
      const speedFrac = (speedVal - 2) / 8;
      const smH = canvas.height - 10, smW = 5, smX = 2, smY = 5;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(smX, smY, smW, smH);
      const fillH = smH * speedFrac;
      const sr = Math.round(speedFrac * 255), sg = Math.round((1 - speedFrac) * 200);
      ctx.fillStyle = `rgb(${sr},${sg},60)`;
      ctx.fillRect(smX, smY + smH - fillH, smW, fillH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(smX, smY, smW, smH);
      ctx.fillStyle = '#aaa';
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('spd', smX + smW / 2, smY + smH + 8);
      ctx.textAlign = 'left';

      // Combo-badge naast score
      if (comboCount >= 2 && comboTimer > 0) {
        const mult = Math.min(comboCount, 6);
        ctx.save();
        ctx.fillStyle = '#f80';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('x' + mult, 72, 9);
        ctx.restore();
      }

      ctx.fillStyle = '#4af';
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Level ' + level, canvas.width / 2, 20);
      ctx.textAlign = 'left';

      // Voortgangsbalk naar volgend level
      const levelProgress = (score % 10) / 10;
      const barW = 120, barH = 5;
      const barX = canvas.width / 2 - barW / 2, barY = 26;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#4af';
      ctx.fillRect(barX, barY, barW * levelProgress, barH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);

      // Hartjes levens
      ctx.font = '18px sans-serif';
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < lives ? '#f44' : '#555';
        ctx.fillText('♥', canvas.width - 28 - i * 22, 20);
      }

      // Mini-kaart (20×10px) rechtsboven
      const mmX = canvas.width - 22, mmY = 32, mmW = 20, mmH = 10;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(mmX, mmY, mmW, mmH);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(mmX, mmY, mmW, mmH);
      for (const o of obstacles) {
        ctx.fillStyle = '#e44';
        ctx.fillRect(mmX + (o.x / canvas.width) * mmW, mmY + (o.y / canvas.height) * mmH, 1, 1);
      }
      ctx.fillStyle = skinColor || '#4af';
      ctx.fillRect(mmX + (player.x / canvas.width) * mmW, mmY + (player.y / canvas.height) * mmH, 2, 1);

      if (comboDisplayTimer > 0) {
        ctx.globalAlpha = Math.min(1, comboDisplayTimer / 20);
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(comboDisplay, canvas.width / 2, 44);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
      }

      if (levelBannerTimer > 0) {
        const alpha = levelBannerTimer > 30 ? 1 : levelBannerTimer / 30;
        const scale = levelBannerTimer > 90 ? 1 + 0.4 * ((120 - levelBannerTimer) / 30) : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.fillStyle = '#4af';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(levelBanner, 0, 0);
        ctx.restore();
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      if (paused && !gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('PAUZE', canvas.width / 2, canvas.height / 2 - 26);
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#4af';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 2);
        ctx.fillStyle = '#ff0';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 22);
        ctx.fillStyle = '#aaa';
        ctx.font = '13px sans-serif';
        ctx.fillText('Druk P of Esc om door te gaan', canvas.width / 2, canvas.height / 2 + 44);
        ctx.textAlign = 'left';
      }

      if (levelFlash > 0) {
        ctx.fillStyle = `rgba(0,255,180,${(levelFlash / 22) * 0.45})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (gameOverFlash > 0) {
        ctx.fillStyle = `rgba(220,0,0,${(gameOverFlash / 30) * 0.6})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px sans-serif';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
        ctx.fillStyle = '#ff0';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 35);
        ctx.fillStyle = '#fff';
        ctx.fillText('Druk Enter om opnieuw te spelen', canvas.width / 2, canvas.height / 2 + 55);
        ctx.textAlign = 'left';
      }
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Skin keuze knoppen
    const skinSelectDiv = document.getElementById('skin-select');
    skinColors.forEach((color, i) => {
      const btn = document.createElement('div');
      btn.style.cssText = `width:22px;height:22px;background:${color};border-radius:4px;cursor:pointer;border:3px solid ${i===0?'#fff':'transparent'};`;
      btn.addEventListener('click', () => {
        skinColor = color;
        skinSelectDiv.querySelectorAll('div').forEach((d, j) => {
          d.style.border = `3px solid ${j === i ? '#fff' : 'transparent'}`;
        });
      });
      skinSelectDiv.appendChild(btn);
    });

    loop();
  </script>
</body>
</html>
