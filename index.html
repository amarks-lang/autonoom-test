<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Blok Renner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 10px; font-size: 1.5rem; }
    canvas { background: #222; border: 2px solid #555; }
    #dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 4px; margin-top: 16px; user-select: none; }
    #dpad button { background: #333; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; touch-action: none; }
    #dpad button:active { background: #4af; }
  </style>
</head>
<body>
  <h1>Blok Renner</h1>
  <canvas id="c" width="480" height="200"></canvas>
  <p id="info">Gebruik pijltjestoetsen of knoppen om te bewegen</p>
  <div id="dpad">
    <span></span>
    <button id="btn-up">▲</button>
    <span></span>
    <button id="btn-left">◀</button>
    <button id="btn-down">▼</button>
    <button id="btn-right">▶</button>
    <span></span><span></span><span></span>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration, type = 'square') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const player = { x: 40, y: 140, w: 30, h: 30, speed: 4, color: '#4af' };

    const obstacles = [];
    let spawnTimer = 0;
    let score = 0;
    let scoreTimer = 0;
    let gameOver = false;
    let gameStarted = false;
    let highscore = parseInt(localStorage.getItem('blokrenner_hs') || '0');

    // Sterren achtergrond
    const stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * 480,
      y: Math.random() * 200,
      size: 1 + Math.random() * 2,
      speed: 0.3 + Math.random() * 0.7
    }));
    function updateStars() {
      for (const s of stars) { s.y += s.speed; if (s.y > 200) { s.y = 0; s.x = Math.random() * 480; } }
    }
    function drawStars() {
      ctx.fillStyle = '#aaa';
      for (const s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Particles
    const particles = [];
    function spawnParticles(x, y) {
      const colors = ['#ff4','#f80','#f44','#f0f','#4ff'];
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x: x + 15, y: y + 15,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 30 + Math.random() * 20
        });
      }
    }

    // Power-up
    let powerUp = null;
    let powerUpTimer = 0;
    let invincible = false;
    let invincibleTimer = 0;
    const POWERUP_INTERVAL = 300;
    const INVINCIBLE_DURATION = 180;

    // Combo-systeem
    let comboCount = 0;
    let comboTimer = 0;
    let comboDisplay = '';
    let comboDisplayTimer = 0;
    const COMBO_WINDOW = 120;

    function spawnObstacle() {
      obstacles.push({
        x: Math.random() * (canvas.width - 20),
        y: -20,
        w: 20,
        h: 20,
        speed: 2 + Math.random() * 2 + score * 0.3
      });
    }

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',  e => keys[e.key] = false);

    function bindBtn(id, key) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if (!gameStarted) { gameStarted = true; } }, { passive: false });
      btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
      btn.addEventListener('mousedown',  () => { keys[key] = true;  if (!gameStarted) { gameStarted = true; } });
      btn.addEventListener('mouseup',    () => { keys[key] = false; });
      btn.addEventListener('mouseleave', () => { keys[key] = false; });
    }
    bindBtn('btn-up',    'ArrowUp');
    bindBtn('btn-down',  'ArrowDown');
    bindBtn('btn-left',  'ArrowLeft');
    bindBtn('btn-right', 'ArrowRight');

    function collides(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playRisingSweep() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function spawnPowerUp() {
      powerUp = { x: Math.random() * (canvas.width - 20), y: -20, w: 20, h: 20, speed: 2 };
      playRisingSweep();
    }

    function reset() {
      player.x = 40; player.y = 140;
      obstacles.length = 0;
      spawnTimer = 0; scoreTimer = 0; score = 0;
      gameOver = false;
      gameStarted = true;
      powerUp = null; powerUpTimer = 0; invincible = false; invincibleTimer = 0;
    }

    document.addEventListener('keydown', e => {
      if (!gameStarted && e.key === 'Enter') { gameStarted = true; }
      if (gameOver && e.key === 'Enter') reset();
    });

    function update() {
      updateStars();
      if (!gameStarted || gameOver) return;

      if (keys['ArrowLeft'])  player.x = Math.max(0, player.x - player.speed);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + player.speed);
      if (keys['ArrowUp'])    player.y = Math.max(0, player.y - player.speed);
      if (keys['ArrowDown'])  player.y = Math.min(canvas.height - player.h, player.y + player.speed);

      const spawnInterval = Math.max(20, 60 - score * 2);
      spawnTimer++;
      if (spawnTimer >= spawnInterval) { spawnObstacle(); spawnTimer = 0; }

      scoreTimer++;
      if (scoreTimer >= 60) { score++; scoreTimer = 0; }

      // Power-up spawnen
      powerUpTimer++;
      if (powerUpTimer >= POWERUP_INTERVAL && !powerUp) { spawnPowerUp(); powerUpTimer = 0; }

      // Power-up bewegen & ophalen
      if (powerUp) {
        powerUp.y += powerUp.speed;
        if (powerUp.y > canvas.height) { powerUp = null; }
        else if (collides(player, powerUp)) {
          invincible = true; invincibleTimer = INVINCIBLE_DURATION;
          powerUp = null; playBeep(660, 0.15);
        }
      }

      // Particles updaten
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Invincibility aftellen
      if (invincible) { invincibleTimer--; if (invincibleTimer <= 0) invincible = false; }

      if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
      if (comboDisplayTimer > 0) comboDisplayTimer--;

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacles[i].speed;
        if (obstacles[i].y > canvas.height) {
          const obsMidX = obstacles[i].x + obstacles[i].w / 2;
          const playerMidX = player.x + player.w / 2;
          if (Math.abs(obsMidX - playerMidX) < 60) {
            comboCount = comboTimer > 0 ? comboCount + 1 : 1;
            comboTimer = COMBO_WINDOW;
            if (comboCount >= 2) {
              const bonus = comboCount * 2;
              score += bonus;
              comboDisplay = `COMBO x${comboCount}! +${bonus}`;
              comboDisplayTimer = 90;
              playBeep(880, 0.1);
            }
          }
          obstacles.splice(i, 1);
        } else if (!invincible && collides(player, obstacles[i])) {
            gameOver = true;
            spawnParticles(player.x, player.y);
            playBeep(180, 0.4);
            if (score > highscore) { highscore = score; localStorage.setItem('blokrenner_hs', highscore); }
            break;
          }
      }
    }

    function drawStartScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4af';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Blok Renner', canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('Ontwijkt de rode blokken!', canvas.width / 2, canvas.height / 2);
      if (highscore > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = '14px sans-serif';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 18);
      }

      // Start knop
      const bx = canvas.width / 2 - 70, by = canvas.height / 2 + 20, bw = 140, bh = 40;
      ctx.fillStyle = '#4af';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('START', canvas.width / 2, by + 28);
      ctx.textAlign = 'left';

      // Klik op knop
      canvas.onclick = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
          gameStarted = true;
          canvas.onclick = null;
        }
      };
    }

    function draw() {
      if (!gameStarted) { drawStartScreen(); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars();
      ctx.fillStyle = '#e44';
      for (const o of obstacles) ctx.fillRect(o.x, o.y, o.w, o.h);

      // Power-up tekenen
      if (powerUp) {
        ctx.fillStyle = '#0f0';
        ctx.fillRect(powerUp.x, powerUp.y, powerUp.w, powerUp.h);
        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.fillText('★', powerUp.x + 4, powerUp.y + 15);
      }

      // Speler knippert als invincible
      if (!invincible || Math.floor(invincibleTimer / 6) % 2 === 0) {
        ctx.fillStyle = invincible ? '#ff0' : player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
      }

      // Particles tekenen
      for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('Score: ' + score, 8, 20);

      if (comboDisplayTimer > 0) {
        ctx.globalAlpha = Math.min(1, comboDisplayTimer / 20);
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(comboDisplay, canvas.width / 2, 44);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px sans-serif';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
        ctx.fillStyle = '#ff0';
        ctx.fillText('Highscore: ' + highscore, canvas.width / 2, canvas.height / 2 + 35);
        ctx.fillStyle = '#fff';
        ctx.fillText('Druk Enter om opnieuw te spelen', canvas.width / 2, canvas.height / 2 + 55);
        ctx.textAlign = 'left';
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
