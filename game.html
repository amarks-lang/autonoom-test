<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Blok Renner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 10px; font-size: 1.5rem; }
    canvas { background: #222; border: 2px solid #555; }
  </style>
</head>
<body>
  <h1>Blok Renner</h1>
  <canvas id="c" width="480" height="200"></canvas>
  <p id="info">Gebruik pijltjestoetsen om te bewegen</p>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const player = { x: 40, y: 140, w: 30, h: 30, speed: 4, color: '#4af' };

    const obstacles = [];
    let spawnTimer = 0;
    let score = 0;
    let scoreTimer = 0;
    let gameOver = false;
    let gameStarted = false;

    function spawnObstacle() {
      obstacles.push({
        x: Math.random() * (canvas.width - 20),
        y: -20,
        w: 20,
        h: 20,
        speed: 2 + Math.random() * 2
      });
    }

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',  e => keys[e.key] = false);

    function collides(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function reset() {
      player.x = 40; player.y = 140;
      obstacles.length = 0;
      spawnTimer = 0; scoreTimer = 0; score = 0;
      gameOver = false;
      gameStarted = true;
    }

    document.addEventListener('keydown', e => {
      if (!gameStarted && e.key === 'Enter') { gameStarted = true; }
      if (gameOver && e.key === 'Enter') reset();
    });

    function update() {
      if (!gameStarted || gameOver) return;

      if (keys['ArrowLeft'])  player.x = Math.max(0, player.x - player.speed);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + player.speed);
      if (keys['ArrowUp'])    player.y = Math.max(0, player.y - player.speed);
      if (keys['ArrowDown'])  player.y = Math.min(canvas.height - player.h, player.y + player.speed);

      spawnTimer++;
      if (spawnTimer >= 60) { spawnObstacle(); spawnTimer = 0; }

      scoreTimer++;
      if (scoreTimer >= 60) { score++; scoreTimer = 0; }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacles[i].speed;
        if (obstacles[i].y > canvas.height) obstacles.splice(i, 1);
        else if (collides(player, obstacles[i])) { gameOver = true; break; }
      }
    }

    function drawStartScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4af';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Blok Renner', canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('Ontwijkt de rode blokken!', canvas.width / 2, canvas.height / 2);

      // Start knop
      const bx = canvas.width / 2 - 70, by = canvas.height / 2 + 20, bw = 140, bh = 40;
      ctx.fillStyle = '#4af';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('START', canvas.width / 2, by + 28);
      ctx.textAlign = 'left';

      // Klik op knop
      canvas.onclick = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
          gameStarted = true;
          canvas.onclick = null;
        }
      };
    }

    function draw() {
      if (!gameStarted) { drawStartScreen(); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e44';
      for (const o of obstacles) ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('Score: ' + score, 8, 20);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px sans-serif';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
        ctx.fillText('Druk Enter om opnieuw te spelen', canvas.width / 2, canvas.height / 2 + 45);
        ctx.textAlign = 'left';
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
