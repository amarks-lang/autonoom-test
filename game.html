<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Blok Renner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 10px; font-size: 1.5rem; }
    canvas { background: #222; border: 2px solid #555; }
  </style>
</head>
<body>
  <h1>Blok Renner</h1>
  <canvas id="c" width="480" height="200"></canvas>
  <p id="info">Gebruik pijltjestoetsen om te bewegen</p>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const player = { x: 40, y: 140, w: 30, h: 30, speed: 4, color: '#4af' };

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',  e => keys[e.key] = false);

    function update() {
      if (keys['ArrowLeft'])  player.x = Math.max(0, player.x - player.speed);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + player.speed);
      if (keys['ArrowUp'])    player.y = Math.max(0, player.y - player.speed);
      if (keys['ArrowDown'])  player.y = Math.min(canvas.height - player.h, player.y + player.speed);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.w, player.h);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
